name: Global CI Gatekeeper
on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  success:
    name: success
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
      actions: read
    timeout-minutes: 20
    if: always()
    steps:
      - name: Wait and Verify All Service Workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GATEKEEPER_WORKFLOW="global-ci-gatekeeper.yml"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"
          attempt=0
          max_attempts=20

          echo "Waiting 30s for other workflows to register..."
          sleep 30

          while [ $attempt -lt $max_attempts ]; do
            echo "--- Attempt $((attempt+1))/$max_attempts ---"

            # Fetch all check-runs for this commit, exclude self
            CHECKS=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" \
              --paginate \
              --jq "[.check_runs[] | select(.name != \"success\")]" \
              | jq -s '[.[] | .[]]')

            TOTAL=$(echo "$CHECKS" | jq 'length')
            echo "Found $TOTAL check-run(s) (excluding self)..."

            if [ "$TOTAL" -eq 0 ]; then
              echo "No other checks found yet. Waiting..."
              sleep 60
              attempt=$((attempt+1))
              continue
            fi

            # Step 2: Fail immediately if any completed check has already failed
            ALREADY_FAILED=$(echo "$CHECKS" | jq -r '
              .[] | select(
                .status == "completed" and
                .conclusion != "success" and
                .conclusion != "skipped" and
                .conclusion != "neutral"
              ) | "\(.name): \(.conclusion)"')

            if [ -n "$ALREADY_FAILED" ]; then
              echo "ERROR: The following check(s) failed — aborting early:"
              echo "$ALREADY_FAILED"
              echo ""
              echo "--- FULL STATUS OF ALL CHECKS ---"
              echo "$CHECKS" | jq -r '.[] | "[\(.status | ascii_upcase)] \(.name): \(.conclusion // "in progress")"'
              exit 1
            fi

            # Step 3: Check if any check-runs are still running
            STILL_RUNNING=$(echo "$CHECKS" | jq -r '
              .[] | select(
                .status == "in_progress" or
                .status == "queued" or
                .status == "waiting" or
                .status == "requested"
              ) | .name')

            # Step 4: Only check pending workflow runs if some check-runs are still running
            # (avoids blocking forever when everything is already done)
            if [ -n "$STILL_RUNNING" ]; then
              PENDING_RUNS=$(gh api "repos/$REPO/actions/runs" \
                --field head_sha="$HEAD_SHA" \
                --field event=pull_request \
                --jq '.workflow_runs[] | select(
                  .path != ".github/workflows/'"$GATEKEEPER_WORKFLOW"'" and
                  (.status == "queued" or .status == "in_progress" or .status == "requested" or .status == "waiting")
                ) | .name' 2>/dev/null || true)

              echo "Still waiting on:"
              echo "$STILL_RUNNING"
              if [ -n "$PENDING_RUNS" ]; then
                echo "Workflow runs still pending (not yet check-runs):"
                echo "$PENDING_RUNS"
              fi
              sleep 60
              attempt=$((attempt+1))
              continue
            fi

            # All checks completed and none failed — print summary and exit
            echo ""
            echo "--- FULL STATUS OF ALL CHECKS ---"
            echo "$CHECKS" | jq -r '.[] | "[\(.conclusion | ascii_upcase)] \(.name)"'
            echo ""
            echo "--- PASSED CHECKS ---"
            echo "$CHECKS" | jq -r '
              .[] | select(
                .conclusion == "success" or
                .conclusion == "skipped" or
                .conclusion == "neutral"
              ) | "✓ \(.name): \(.conclusion)"'
            echo ""
            echo "All checks passed. Safe to merge."
            break

          done

          if [ $attempt -eq $max_attempts ]; then
            echo "ERROR: Timed out waiting for checks to complete."
            exit 1
          fi
