name: Global CI Gatekeeper

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  success:
    name: success
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
      actions: read # Thêm quyền này để đảm bảo đọc được trạng thái workflow
    timeout-minutes: 20
    if: always()

    steps:
      - name: Wait and Verify All Service Workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          attempt=0
          max_attempts=20

          while [ $attempt -lt $max_attempts ]; do
            # Collect into a valid JSON array for safe processing
            CHECKS=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
              --paginate \
              --jq '[.check_runs[] | select(.name != "success")]')

            # Merge paginated arrays into one (--paginate returns multiple arrays)
            CHECKS=$(echo "$CHECKS" | jq -s '[.[] | .[]]')

            TOTAL=$(echo "$CHECKS" | jq 'length')
            echo "Found $TOTAL check-run(s) (excluding self)..."

            # If no other checks are registered yet, keep waiting
            if [ "$TOTAL" -eq 0 ]; then
              echo "No other checks found yet. Waiting for them to register..."
              sleep 60
              attempt=$((attempt+1))
              continue
            fi

            # Check for any non-terminal statuses
            STILL_RUNNING=$(echo "$CHECKS" | jq -r '
              .[] | select(
                .status == "in_progress" or
                .status == "queued" or
                .status == "waiting" or
                .status == "requested"
              ) | .name')

            if [ -z "$STILL_RUNNING" ]; then
              echo "All $TOTAL check(s) have completed."
              break
            fi

            echo "Still waiting on:"
            echo "$STILL_RUNNING"
            echo "Attempt $((attempt+1))/$max_attempts — retrying in 60s..."
            sleep 60
            attempt=$((attempt+1))
          done

          if [ $attempt -eq $max_attempts ]; then
            echo "ERROR: Timed out waiting for checks to complete."
            exit 1
          fi

          echo "--- RESULTS ---"
          echo "$CHECKS" | jq -r '.[] | "\(.name): \(.conclusion)"'

          FAILED=$(echo "$CHECKS" | jq -r '
            .[] | select(
              .conclusion != "success" and
              .conclusion != "skipped" and
              .conclusion != "neutral"
            ) | "\(.name): \(.conclusion)"')

          if [ -n "$FAILED" ]; then
            echo "ERROR: The following checks did not pass:"
            echo "$FAILED"
            exit 1
          fi

          echo "All checks passed. Safe to merge."
