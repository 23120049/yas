name: Global CI Gatekeeper

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  success:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check status of all other workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the combined status of all checks for the current commit
          # We filter out this 'success' check itself to avoid a circular logic loop
          STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
            --jq '.check_runs[] | select(.name != "success") | .conclusion')

          echo "Detected statuses: $STATUS"

          if echo "$STATUS" | grep -q "failure"; then
            echo "One or more microservice workflows failed."
            exit 1
          elif echo "$STATUS" | grep -q "action_required"; then
            echo "Some workflows are still pending or require action."
            exit 1
          fi

          echo "All relevant microservice checks passed!"
