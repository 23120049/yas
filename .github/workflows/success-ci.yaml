name: Global CI Gatekeeper
on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  success:
    name: success
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
      actions: read
    timeout-minutes: 20
    if: always()
    steps:
      - name: Wait and Verify All Service Workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GATEKEEPER_WORKFLOW="global-ci-gatekeeper.yml"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          REPO="${{ github.repository }}"

          attempt=0
          max_attempts=20

          echo "Waiting 30s for other workflows to register..."
          sleep 30

          while [ $attempt -lt $max_attempts ]; do
            echo "--- Attempt $((attempt+1))/$max_attempts ---"

            # Lấy Check Runs (Sửa lại jq để tránh mảng lồng nhau gây lỗi)
            RAW_CHECKS=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" --paginate)
            CHECKS=$(echo "$RAW_CHECKS" | jq -c '[.check_runs[] | select(.name != "success")]')
            
            TOTAL=$(echo "$CHECKS" | jq 'length')
            echo "Found $TOTAL check-run(s) (excluding self)..."

            # 1. Kiểm tra Workflow Runs (Sửa API path để tránh 404)
            # Dùng endpoint /actions/runs của repo để quét theo SHA
            PENDING_RUNS=$(gh api "repos/$REPO/actions/runs?head_sha=$HEAD_SHA&event=pull_request" \
              --jq ".workflow_runs[] | select(
                (.path | endswith(\"$GATEKEEPER_WORKFLOW\") | not) and
                (.status == \"queued\" or .status == \"in_progress\" or .status == \"requested\" or .status == \"waiting\")
              ) | .name")

            if [ -n "$PENDING_RUNS" ]; then
              echo "Workflow runs still pending: $PENDING_RUNS"
            else
              # 2. Nếu không có Pending, kiểm tra trạng thái các Check Runs đã đăng ký
              STILL_RUNNING=$(echo "$CHECKS" | jq -r '
                .[] | select(
                  .status == "in_progress" or .status == "queued" or .status == "waiting" or .status == "requested"
                ) | .name')

              if [ -z "$STILL_RUNNING" ]; then
                if [ "$TOTAL" -gt 0 ]; then
                   echo "All $TOTAL check(s) completed."
                   break
                else
                   echo "Waiting for other workflows to register..."
                fi
              else
                echo "Still waiting on: $STILL_RUNNING"
              fi
            fi

            # 3. Kiểm tra Fail sớm (Giữ nguyên logic bảo mật)
            ALREADY_FAILED=$(echo "$CHECKS" | jq -r '
              .[] | select(.status == "completed" and (.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral"))
              | "\(.name): \(.conclusion)"')

            if [ -n "$ALREADY_FAILED" ]; then
              echo "ERROR: The following check(s) failed — aborting early:"
              echo "$ALREADY_FAILED"
              exit 1
            fi

            attempt=$((attempt+1))
            [ $attempt -lt $max_attempts ] && sleep 60
          done

          echo "--- FINAL RESULTS ---"
          echo "$CHECKS" | jq -r '.[] | "\(.name): \(.conclusion)"'
          echo "All checks passed. Safe to merge."
