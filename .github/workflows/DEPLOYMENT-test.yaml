name: Developer Build & Test Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Chọn service muốn deploy thử'
        required: true
        type: choice
        options:
          - cart
          - media
          - customer
          - inventory
          - order
          - payment
          - payment-paypal
          - product
          - promotion
          - rating
          - recommendation
          - search
          - tax
          - storefront-bff
          - backoffice-bff
          - webhook
          - location
          - sampledata
          - storefront
          - backoffice
      image_tag:
        description: 'Nhập image tag hoặc tên branch muốn deploy vào dev'
        required: true
        type: string

jobs:
  developer_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yas repository
        uses: actions/checkout@v4

      - name: Install yq
        run: bash .github/scripts/install-yq.sh

      - name: Checkout yas-gitops repository
        uses: actions/checkout@v4
        with:
          repository: '23120049/yas-gitops'
          token: ${{ secrets.GITOPS_TOKEN }}
          path: yas-gitops-repo

      - name: Resolve branch SHA if needed and update dev image tag
        env:
          GITOPS_DIR: yas-gitops-repo
          ENVIRONMENT: dev
          SERVICE: ${{ github.event.inputs.service }}
          INPUT_TAG: ${{ github.event.inputs.image_tag }}
          ROLLBACK_FILE: yas-gitops-repo/rollback_state.yaml
        run: |
          set -euo pipefail
          
          # Trim whitespace
          INPUT_TAG=$(echo "$INPUT_TAG" | xargs)
          
          # Check if the input is a branch name by querying the remote repo
          echo "Checking if '$INPUT_TAG' is a branch name..."
          SHA=$(git ls-remote https://github.com/23120049/yas.git "refs/heads/$INPUT_TAG" | cut -f1)
          
          if [ -n "$SHA" ]; then
            echo "Resolved branch '$INPUT_TAG' to commit SHA: $SHA"
            IMAGE_TAG="$SHA"
          else
            echo "'$INPUT_TAG' is not a branch name (or branch not found). Using it directly as the image tag."
            IMAGE_TAG="$INPUT_TAG"
          fi
          
          # Export to next steps
          echo "RESOLVED_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          
          # Export variables and run update script
          export SERVICE
          export IMAGE_TAG
          bash .github/scripts/update-gitops-image-tag.sh

      - name: Commit and push GitOps changes
        working-directory: yas-gitops-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add values/dev/dynamic-tags rollback_state.yaml
          git commit -m "chore(dev): test deploy ${{ github.event.inputs.service }} with tag ${{ env.RESOLVED_TAG }}" || echo "No changes to commit"
          git push origin main
