name: Developer Build & Test Deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Chọn service muốn deploy thử'
        required: true
        type: choice
        options:
          - cart
          - media
          - customer
          - inventory
          - order
          - payment
          - payment-paypal
          - product
          - promotion
          - rating
          - recommendation
          - search
          - tax
          - storefront-bff
          - backoffice-bff
          - webhook
          - location
          - sampledata
          - storefront
          - backoffice
      image_tag:
        description: 'Nhập image tag muốn deploy vào dev'
        required: true
        type: string

jobs:
  developer_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yas repository
        uses: actions/checkout@v4

      - name: Install yq
        run: bash .github/scripts/install-yq.sh

      - name: Checkout yas-gitops repository
        uses: actions/checkout@v4
        with:
          repository: '23120049/yas-gitops'
          token: ${{ secrets.GITOPS_TOKEN }}
          path: yas-gitops-repo

      - name: Update dev image tag and save rollback state
        env:
          GITOPS_DIR: yas-gitops-repo
          ENVIRONMENT: dev
          SERVICE: ${{ github.event.inputs.service }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          ROLLBACK_FILE: yas-gitops-repo/rollback_state.yaml
        run: bash .github/scripts/update-gitops-image-tag.sh

      - name: Commit and push GitOps changes
        working-directory: yas-gitops-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add values/dev/dynamic-tags rollback_state.yaml
          git commit -m "chore(dev): test deploy ${{ github.event.inputs.service }} with tag ${{ github.event.inputs.image_tag }}" || echo "No changes to commit"
          git push origin main
