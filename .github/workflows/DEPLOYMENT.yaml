name: Continuous Deployment (GitOps Auto-Update)

permissions:
  contents: read
  packages: read

concurrency:
  group: gitops-deployment-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - 'cart/**'
      - 'media/**'
      - 'customer/**'
      - 'inventory/**'
      - 'order/**'
      - 'payment/**'
      - 'payment-paypal/**'
      - 'product/**'
      - 'promotion/**'
      - 'rating/**'
      - 'recommendation/**'
      - 'search/**'
      - 'tax/**'
      - 'storefront-bff/**'
      - 'backoffice-bff/**'
      - 'webhook/**'
      - 'location/**'
      - 'sampledata/**'
      - 'storefront/**'
      - 'backoffice/**'
      - "pom.xml"
      
  release:
    types: [published]

env:
  SERVICES: >-
    cart media customer inventory order payment payment-paypal product promotion
    rating recommendation search tax storefront-bff backoffice-bff webhook
    location sampledata storefront backoffice

jobs:
  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yas repository
        uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cart: 'cart/**'
            media: 'media/**'
            customer: 'customer/**'
            inventory: 'inventory/**'
            order: 'order/**'
            payment: 'payment/**'
            payment_paypal: 'payment-paypal/**'
            product: 'product/**'
            promotion: 'promotion/**'
            rating: 'rating/**'
            recommendation: 'recommendation/**'
            search: 'search/**'
            tax: 'tax/**'
            storefront_bff: 'storefront-bff/**'
            backoffice_bff: 'backoffice-bff/**'
            webhook: 'webhook/**'
            location: 'location/**'
            sampledata: 'sampledata/**'
            storefront: 'storefront/**'
            backoffice: 'backoffice/**'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: bash .github/scripts/install-yq.sh

      - name: Checkout yas-gitops repository
        uses: actions/checkout@v4
        with:
          repository: '23120049/yas-gitops'
          token: ${{ secrets.GITOPS_TOKEN }}
          path: yas-gitops-repo

      - name: Update dev image tags
        timeout-minutes: 25
        env:
          GITOPS_DIR: yas-gitops-repo
          ENVIRONMENT: dev
          IMAGE_TAG: ${{ github.sha }}
          CART_CHANGED: ${{ steps.filter.outputs.cart }}
          MEDIA_CHANGED: ${{ steps.filter.outputs.media }}
          CUSTOMER_CHANGED: ${{ steps.filter.outputs.customer }}
          INVENTORY_CHANGED: ${{ steps.filter.outputs.inventory }}
          ORDER_CHANGED: ${{ steps.filter.outputs.order }}
          PAYMENT_CHANGED: ${{ steps.filter.outputs.payment }}
          PAYMENT_PAYPAL_CHANGED: ${{ steps.filter.outputs.payment_paypal }}
          PRODUCT_CHANGED: ${{ steps.filter.outputs.product }}
          PROMOTION_CHANGED: ${{ steps.filter.outputs.promotion }}
          RATING_CHANGED: ${{ steps.filter.outputs.rating }}
          RECOMMENDATION_CHANGED: ${{ steps.filter.outputs.recommendation }}
          SEARCH_CHANGED: ${{ steps.filter.outputs.search }}
          TAX_CHANGED: ${{ steps.filter.outputs.tax }}
          STOREFRONT_BFF_CHANGED: ${{ steps.filter.outputs.storefront_bff }}
          BACKOFFICE_BFF_CHANGED: ${{ steps.filter.outputs.backoffice_bff }}
          WEBHOOK_CHANGED: ${{ steps.filter.outputs.webhook }}
          LOCATION_CHANGED: ${{ steps.filter.outputs.location }}
          SAMPLEDATA_CHANGED: ${{ steps.filter.outputs.sampledata }}
          STOREFRONT_CHANGED: ${{ steps.filter.outputs.storefront }}
          BACKOFFICE_CHANGED: ${{ steps.filter.outputs.backoffice }}
        run: |
          set -euo pipefail

          # Build workflows run independently from this deployment workflow.
          # Wait until every changed service has published this exact immutable
          # commit tag before changing the desired state in yas-gitops.
          for SERVICE in $SERVICES; do
            VAR_NAME="$(echo "${SERVICE}_CHANGED" | tr '[:lower:]-' '[:upper:]_')"
            if [ "${!VAR_NAME:-false}" = "true" ]; then
              IMAGE="ghcr.io/23120049/yas-${SERVICE}:${IMAGE_TAG}"
              FOUND=false

              for ATTEMPT in $(seq 1 60); do
                if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
                  echo "Image is available: $IMAGE"
                  FOUND=true
                  break
                fi

                echo "Waiting for $IMAGE (attempt ${ATTEMPT}/60)..."
                sleep 20
              done

              if [ "$FOUND" != "true" ]; then
                echo "Image was not published before timeout: $IMAGE" >&2
                exit 1
              fi
            fi
          done

          for SERVICE in $SERVICES; do
            VAR_NAME="$(echo "${SERVICE}_CHANGED" | tr '[:lower:]-' '[:upper:]_')"
            if [ "${!VAR_NAME:-false}" = "true" ]; then
              SERVICE="$SERVICE" bash .github/scripts/update-gitops-image-tag.sh
            fi
          done

      - name: Commit and push dev GitOps changes
        working-directory: yas-gitops-repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add values/dev/dynamic-tags
          if ! git diff --cached --exit-code; then
            git commit -m "chore(dev): auto-update dynamic image tags [commit: ${{ github.sha }}]"
            git push origin main
          else
            echo "No dev image tag changes to commit."
          fi

  deploy-staging:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yas repository
        uses: actions/checkout@v4

      - name: Install yq
        run: bash .github/scripts/install-yq.sh

      - name: Checkout yas-gitops repository
        uses: actions/checkout@v4
        with:
          repository: '23120049/yas-gitops'
          token: ${{ secrets.GITOPS_TOKEN }}
          path: yas-gitops-repo

      - name: Update staging image tags to latest
        env:
          GITOPS_DIR: yas-gitops-repo
          ENVIRONMENT: staging
          IMAGE_TAG: latest
        run: |
          set -euo pipefail
          for SERVICE in $SERVICES; do
            SERVICE="$SERVICE" bash .github/scripts/update-gitops-image-tag.sh
          done

      - name: Commit and push staging GitOps changes
        working-directory: yas-gitops-repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add values/staging/dynamic-tags
          if ! git diff --cached --exit-code; then
            git commit -m "chore(staging): update image tags to latest for release ${{ github.event.release.tag_name }}"
            git push origin main
          else
            echo "No staging image tag changes to commit."
          fi
