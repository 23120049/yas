name: Continuous Deployment (GitOps Auto-Update)

permissions:
  contents: read
  packages: write

concurrency:
  group: gitops-deployment-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - 'cart/**'
      - 'media/**'
      - 'customer/**'
      - 'inventory/**'
      - 'order/**'
      - 'payment/**'
      - 'payment-paypal/**'
      - 'product/**'
      - 'promotion/**'
      - 'rating/**'
      - 'recommendation/**'
      - 'search/**'
      - 'tax/**'
      - 'storefront-bff/**'
      - 'backoffice-bff/**'
      - 'webhook/**'
      - 'location/**'
      - 'sampledata/**'
      - 'storefront/**'
      - 'backoffice/**'
      - "pom.xml"
      
  release:
    types: [published]

env:
  SERVICES: >-
    cart media customer inventory order payment payment-paypal product promotion
    rating recommendation search tax storefront-bff backoffice-bff webhook
    location sampledata storefront backoffice

jobs:
  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yas repository
        uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            cart:
              - 'cart/**'
              - 'pom.xml'
            media:
              - 'media/**'
              - 'pom.xml'
            customer:
              - 'customer/**'
              - 'pom.xml'
            inventory:
              - 'inventory/**'
              - 'pom.xml'
            order:
              - 'order/**'
              - 'pom.xml'
            payment:
              - 'payment/**'
              - 'pom.xml'
            payment_paypal:
              - 'payment-paypal/**'
              - 'pom.xml'
            product:
              - 'product/**'
              - 'pom.xml'
            promotion:
              - 'promotion/**'
              - 'pom.xml'
            rating:
              - 'rating/**'
              - 'pom.xml'
            recommendation:
              - 'recommendation/**'
              - 'pom.xml'
            search:
              - 'search/**'
              - 'pom.xml'
            tax:
              - 'tax/**'
              - 'pom.xml'
            storefront_bff:
              - 'storefront-bff/**'
              - 'pom.xml'
            backoffice_bff:
              - 'backoffice-bff/**'
              - 'pom.xml'
            webhook:
              - 'webhook/**'
              - 'pom.xml'
            location:
              - 'location/**'
              - 'pom.xml'
            sampledata:
              - 'sampledata/**'
              - 'pom.xml'
            storefront:
              - 'storefront/**'
              - 'pom.xml'
            backoffice:
              - 'backoffice/**'
              - 'pom.xml'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: bash .github/scripts/install-yq.sh

      - name: Checkout yas-gitops repository
        uses: actions/checkout@v4
        with:
          repository: '23120049/yas-gitops'
          token: ${{ secrets.GITOPS_TOKEN }}
          path: yas-gitops-repo

      - name: Update dev image tags
        timeout-minutes: 25
        env:
          GITOPS_DIR: yas-gitops-repo
          ENVIRONMENT: dev
          IMAGE_TAG: ${{ github.sha }}
          CART_CHANGED: ${{ steps.filter.outputs.cart }}
          MEDIA_CHANGED: ${{ steps.filter.outputs.media }}
          CUSTOMER_CHANGED: ${{ steps.filter.outputs.customer }}
          INVENTORY_CHANGED: ${{ steps.filter.outputs.inventory }}
          ORDER_CHANGED: ${{ steps.filter.outputs.order }}
          PAYMENT_CHANGED: ${{ steps.filter.outputs.payment }}
          PAYMENT_PAYPAL_CHANGED: ${{ steps.filter.outputs.payment_paypal }}
          PRODUCT_CHANGED: ${{ steps.filter.outputs.product }}
          PROMOTION_CHANGED: ${{ steps.filter.outputs.promotion }}
          RATING_CHANGED: ${{ steps.filter.outputs.rating }}
          RECOMMENDATION_CHANGED: ${{ steps.filter.outputs.recommendation }}
          SEARCH_CHANGED: ${{ steps.filter.outputs.search }}
          TAX_CHANGED: ${{ steps.filter.outputs.tax }}
          STOREFRONT_BFF_CHANGED: ${{ steps.filter.outputs.storefront_bff }}
          BACKOFFICE_BFF_CHANGED: ${{ steps.filter.outputs.backoffice_bff }}
          WEBHOOK_CHANGED: ${{ steps.filter.outputs.webhook }}
          LOCATION_CHANGED: ${{ steps.filter.outputs.location }}
          SAMPLEDATA_CHANGED: ${{ steps.filter.outputs.sampledata }}
          STOREFRONT_CHANGED: ${{ steps.filter.outputs.storefront }}
          BACKOFFICE_CHANGED: ${{ steps.filter.outputs.backoffice }}
        run: |
          set -euo pipefail

          # Build workflows run independently from this deployment workflow.
          # Wait until every changed service has published this exact immutable
          # commit tag before changing the desired state in yas-gitops.
          for SERVICE in $SERVICES; do
            VAR_NAME="$(echo "${SERVICE}_CHANGED" | tr '[:lower:]-' '[:upper:]_')"
            if [ "${!VAR_NAME:-false}" = "true" ]; then
              IMAGE="ghcr.io/23120049/yas-${SERVICE}:${IMAGE_TAG}"
              FOUND=false

              for ATTEMPT in $(seq 1 60); do
                if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
                  echo "Image is available: $IMAGE"
                  FOUND=true
                  break
                fi

                echo "Waiting for $IMAGE (attempt ${ATTEMPT}/60)..."
                sleep 20
              done

              if [ "$FOUND" != "true" ]; then
                echo "Image was not published before timeout: $IMAGE" >&2
                exit 1
              fi
            fi
          done

          for SERVICE in $SERVICES; do
            VAR_NAME="$(echo "${SERVICE}_CHANGED" | tr '[:lower:]-' '[:upper:]_')"
            if [ "${!VAR_NAME:-false}" = "true" ]; then
              SERVICE="$SERVICE" bash .github/scripts/update-gitops-image-tag.sh
            fi
          done

      - name: Commit and push dev GitOps changes
        working-directory: yas-gitops-repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add values/dev/dynamic-tags
          if ! git diff --cached --exit-code; then
            git commit -m "chore(dev): auto-update dynamic image tags [commit: ${{ github.sha }}]"
            git push origin main
          else
            echo "No dev image tag changes to commit."
          fi

  deploy-staging:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yas repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        run: bash .github/scripts/install-yq.sh

      - name: Checkout yas-gitops repository
        uses: actions/checkout@v4
        with:
          repository: '23120049/yas-gitops'
          token: ${{ secrets.GITOPS_TOKEN }}
          path: yas-gitops-repo

      - name: Tag released service image and update staging image tag
        env:
          GITOPS_DIR: yas-gitops-repo
          ENVIRONMENT: staging
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          IMAGE_TAG="$RELEASE_TAG_NAME"

          if ! [[ "$IMAGE_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Release tag is not a valid Docker image tag: $IMAGE_TAG" >&2
            exit 1
          fi

          RELEASED_SERVICE=""

          for SERVICE in $SERVICES; do
            if [[ "$IMAGE_TAG" == "$SERVICE" || "$IMAGE_TAG" == "$SERVICE"-* ]]; then
              if [ -z "$RELEASED_SERVICE" ] || [ "${#SERVICE}" -gt "${#RELEASED_SERVICE}" ]; then
                RELEASED_SERVICE="$SERVICE"
              fi
            fi
          done

          if [ -z "$RELEASED_SERVICE" ]; then
            echo "Could not determine service from release tag: $IMAGE_TAG" >&2
            echo "Expected release tags like cart-1.2.3 or payment-paypal-1.2.3." >&2
            exit 1
          fi

          IMAGE_REPOSITORY="ghcr.io/23120049/yas-${RELEASED_SERVICE}"
          LATEST_IMAGE="${IMAGE_REPOSITORY}:latest"
          RELEASE_IMAGE="${IMAGE_REPOSITORY}:${IMAGE_TAG}"

          docker manifest inspect "$LATEST_IMAGE" >/dev/null
          docker buildx imagetools create --tag "$RELEASE_IMAGE" "$LATEST_IMAGE"

          SERVICE="$RELEASED_SERVICE" IMAGE_TAG="$IMAGE_TAG" bash .github/scripts/update-gitops-image-tag.sh

      - name: Commit and push staging GitOps changes
        working-directory: yas-gitops-repo
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add values/staging/dynamic-tags
          if ! git diff --cached --exit-code; then
            git commit -m "chore(staging): update image tag for release ${{ github.event.release.tag_name }}"
            git push origin main
          else
            echo "No staging image tag changes to commit."
          fi
