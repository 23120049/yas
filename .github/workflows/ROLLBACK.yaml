name: Rollback Dev Environment

on:
  workflow_dispatch:

jobs:
  rollback_dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yas repository
        uses: actions/checkout@v4

      - name: Install yq
        run: .github/scripts/install-yq.sh

      - name: Checkout yas-gitops repository
        uses: actions/checkout@v4
        with:
          repository: '23120049/yas-gitops'
          token: ${{ secrets.GITOPS_TOKEN }}
          path: yas-gitops-repo

      - name: Restore dev image tags from rollback state
        env:
          GITOPS_DIR: yas-gitops-repo
          ENVIRONMENT: dev
        run: .github/scripts/rollback-gitops-image-tags.sh

      - name: Commit and push GitOps rollback
        working-directory: yas-gitops-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add values/dev/dynamic-tags
          git commit -m "chore(dev): rollback image tags to previous state" || echo "No changes to commit"
          git push origin main
