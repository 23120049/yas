name: Rollback Dev Environment

on:
  workflow_dispatch:

jobs:
  rollback_dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout yas-gitops Repo
        uses: actions/checkout@v4
        with:
          repository: '23120049/yas-gitops'
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Apply Rollback State to Dev
        run: |
          TARGET_FILE="values/dev/dynamic-tags/image-tags.yaml"
          BACKUP_FILE="rollback_state.yaml"
          
          if [ -f "$BACKUP_FILE" ]; then
            # Sử dụng yq để merge hoặc ghi đè các tag từ file backup sang file target
            yq eval-all 'select(fileIndex == 0) * select(fileIndex == 1)' $TARGET_FILE $BACKUP_FILE > temp.yaml
            mv temp.yaml $TARGET_FILE
            echo "Rollback state applied successfully."
          else
            echo "No rollback_state.yaml found! Cannot perform rollback."
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add values/dev/dynamic-tags/image-tags.yaml
          git commit -m "chore(dev): rollback image tags to previous state" || echo "No changes to commit"
          git push origin main